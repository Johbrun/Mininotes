{# Page de création d'une nouvelle note. #}
{% extends "base.html" %}

{% block content %}
<h1>Nouvelle note</h1>

{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

<form method="post" action="{{ url_for('note_new') }}">
    <label>
        Titre
        <input type="text" name="title" required>
    </label>

    <label>
        Contenu
        <textarea name="content" rows="10"></textarea>
    </label>

    <button type="submit">Créer</button>
</form>

<p><a href="{{ url_for('home') }}">Annuler</a></p>
{% endblock %}
